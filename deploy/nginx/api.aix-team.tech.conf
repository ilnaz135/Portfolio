upstream portfolio_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.aix-team.tech;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aix-team.tech;

    ssl_certificate /etc/letsencrypt/live/api.aix-team.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aix-team.tech/privkey.pem;

    access_log /var/log/nginx/api.aix-team.tech.access.log;
    error_log /var/log/nginx/api.aix-team.tech.error.log;

    client_max_body_size 20m;

    location / {
        proxy_pass http://portfolio_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }
}
