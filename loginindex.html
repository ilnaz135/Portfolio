<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Вход и регистрация | Цифровое портфолио УрФУ</title>
    <!-- Подключаем шрифт Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/login.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="icon" href="/favicon-irit2.ico">
</head>
<body>
    <!-- Кнопка переключения темы -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="logo-icon-large">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1 class="auth-title">Цифровое портфолио</h1>
            <p class="auth-subtitle">Уральский федеральный университет</p>
        </div>

        <!-- Табы переключения -->
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Вход</button>
            <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>

        <!-- Формы -->
        <div class="auth-forms">
            <!-- Форма входа -->
            <form class="auth-form active" id="loginForm"">
                <div class="input-group">
                    <label class="input-label">Email или username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="text" placeholder="ivanov@urfu.ru или @vanok_dev" id="loginEmail">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Пароль</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="••••••••" id="loginPassword">
                    </div>
                </div>

                <div class="auth-options">
                    <label class="checkbox">
                        <input type="checkbox">
                        <span>Запомнить меня</span>
                    </label>
                    <a href="#" class="forgot-link">Забыли пароль?</a>
                </div>

                <button type="submit" class="auth-btn">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>
            </form>

            <!-- Форма регистрации -->
            <form class="auth-form" id="registerForm">
                <div class="input-group">
                    <label class="input-label">ФИО</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="Иванов Иван Иванович" id="registerFullname">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-at"></i>
                        <input type="text" placeholder="vanok_dev" id="registerUsername">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="ivanov@urfu.ru" id="registerEmail">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Пароль</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="••••••••" id="registerPassword">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Подтверждение пароля</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="••••••••" id="registerConfirmPassword">
                    </div>
                </div>

                <div class="auth-options">
                    <label class="checkbox">
                        <input type="checkbox" required>
                        <span>Я соглашаюсь с <a href="#" class="forgot-link">условиями использования</a></span>
                    </label>
                </div>

                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-plus"></i> Зарегистрироваться
                </button>
            </form>
        </div>

        <div class="auth-footer">
            <p>© 2026 Цифровое портфолио УрФУ</p>
            <p style="margin-top: 8px;">
                <a href="#">Справка</a> · 
                <a href="#">Поддержка</a> · 
                <a href="#">Конфиденциальность</a>
            </p>
        </div>
    </div>
    <script src="/js/login.js"></script>
</body>
</html>
